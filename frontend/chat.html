<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
</head>
<body>

<h2>Chatbot Banco</h2>

<button onclick="verProductos()">Ver productos</button>

<div id="chat"></div>

<input id="msg" placeholder="Escribe...">
<button onclick="enviar()">Enviar</button>

<script>
function enviar() {
    let mensaje = document.getElementById("msg").value;

    fetch("http://localhost:8080/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            rut_cliente: localStorage.getItem("rut"),
            mensaje: mensaje
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chat").innerHTML += 
            "<p><b>Tú:</b> " + mensaje + "</p>" +
            "<p><b>Bot:</b> " + data.respuesta + "</p>";
    });
}

function verProductos() {
    fetch("http://localhost:8080/api/products")
    .then(res => res.json())
    .then(products => {
        let out = "";
        products.forEach(p => {
            out += "<p><b>" + p.id + "</b>: " + p.name + " - " + p.description + "</p>";
        });
        document.getElementById("chat").innerHTML += out;
    });
}
</script>

</body>
</html>
